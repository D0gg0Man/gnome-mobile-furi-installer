# gnome-mali on drmadapter: guarantee the compositor's environment regardless
# of what a previous (phosh) session imported into the user manager.
# EGL_PLATFORM=wayland inside mutter sends hybris EGL down the wayland-client
# platform and breaks its display init; the XDG identifiers gate session-
# specific behavior (e.g. libdrm-hybris's is_gnome()).
[Service]
UnsetEnvironment=EGL_PLATFORM WAYLAND_DISPLAY WLR_BACKENDS WLR_RENDERER HYBRIS_WLROOTS GBM_HYBRIS_LINEAR
Environment=XDG_CURRENT_DESKTOP=GNOME
Environment=XDG_SESSION_DESKTOP=gnome
Environment=HYBRIS_EGLPLATFORM=drmadapter
