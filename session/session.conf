[Unit]
# GNOME 49: org.gnome.Shell.target pulls org.gnome.Shell@wayland.service.
# The gnome-mali launcher sets XDG_SESSION_TYPE=wayland for @wayland's
# ConditionEnvironment. (gnome-session-services.target does not exist on 49;
# the real services target is gnome-session-basic-services.target, already
# pulled in by the normal session chain.)
Requires=org.gnome.Shell.target
Wants=gnome-mali-strip-hwcomposer.service
# FuriOS gnome-session does not auto-start the gsd components, so pull in the
# ones we need: MediaKeys (hardware volume keys) and Power (brightness backend).
Wants=org.gnome.SettingsDaemon.MediaKeys.target org.gnome.SettingsDaemon.Power.target
After=org.gnome.SettingsDaemon.MediaKeys.target org.gnome.SettingsDaemon.Power.target
